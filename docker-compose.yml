services:

  # ── Base de datos PostgreSQL ─────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: globalgemba_db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       globalgemba
      POSTGRES_USER:     gemba_user
      POSTGRES_PASSWORD: gemba_pass_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Estos scripts se ejecutan automáticamente la primera vez
      - ./back/database/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./back/database/seed.sql:/docker-entrypoint-initdb.d/02_seed.sql
      - ./back/database/fix_passwords.sql:/docker-entrypoint-initdb.d/03_fix_passwords.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gemba_user -d globalgemba"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── Carga automática de datos ────────────────────────────────
  # Se ejecuta SIEMPRE al hacer docker compose up — no requiere comandos manuales
  init-db:
    image: postgres:16-alpine
    container_name: globalgemba_init
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: gemba_pass_dev
    volumes:
      - ./back/database/init_all.sql:/init_all.sql
    command: psql -h postgres -U gemba_user -d globalgemba -f /init_all.sql

  # ── Backend Express + Node.js ────────────────────────────────
  api:
    build: ./back
    container_name: globalgemba_api
    restart: unless-stopped
    environment:
      DB_HOST:     postgres
      DB_PORT:     5432
      DB_NAME:     globalgemba
      DB_USER:     gemba_user
      DB_PASSWORD: gemba_pass_dev
      JWT_SECRET:  cambia_esto_en_produccion
      PORT:        3001
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      init-db:
        condition: service_completed_successfully


  # ── Frontend React + Vite ────────────────────────────────────
  frontend:
    build: ./front/appGlobalGemba
    container_name: globalgemba_frontend
    restart: unless-stopped
    environment:
      API_TARGET: http://api:3001
    ports:
      - "5173:5173"
    depends_on:
      - api

  # ── PgAdmin (interfaz visual de la BD) ──────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: globalgemba_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL:    admin@globalgemba.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
